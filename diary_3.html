/* ════ COVER ════ */
#nb-cover {
  width:440px; height:640px; cursor:pointer;
  transition:transform .45s ease, opacity .45s ease;
  filter:none;
  display:block;
  position:relative;
}
#nb-cover:hover { transform:scale(1.02); }
#nb-cover.nb-closing { opacity:0; transform:scale(.96); }
.nb-cover-img {
  width:100%; height:100%;
  background-image:url('cover.png');
  background-size:100% 100%; background-repeat:no-repeat;
  position:relative; overflow:hidden;
}
.nb-open-hint {
  position:absolute; bottom:26px; left:0; right:0;
  text-align:center;
  font-family:Georgia, serif; font-style:italic;
  font-size:15px; color:rgba(245,225,190,.85);
  letter-spacing:2px;
  text-shadow:0 1px 6px rgba(0,0,0,.8);
  opacity:0; transition:opacity .3s;
}
#nb-cover:hover .nb-open-hint { opacity:1; }

/* ════ OPEN BOOK ════ */
#nb-book-open { display:none; flex-direction:column; align-items:center; }
#nb-book-open.nb-on { display:flex; animation:nbfade .5s ease; }
@keyframes nbfade {
  from { opacity:0; transform:scale(.97); }
  to { opacity:1; transform:scale(1); }
}

#flipbook-wrap {
  filter:none;
  position:relative;
  width:1004px;
  height:730px;
}

#flipbook {
  width:1004px;
  height:730px;
}

.page {
  width:502px;
  height:730px;
  overflow:hidden;
  position:relative;
  user-select:none;
  background-color:transparent;
}
.page.lp { border-radius:8px 0 0 8px; }
.page.rp { border-radius:0 8px 8px 0; }

.pg {
  width:100%; height:100%;
  background-repeat:no-repeat;
}
.page.lp .pg { border-radius:8px 0 0 8px; }
.page.rp .pg { border-radius:0 8px 8px 0; }

/* subtle spine shading */
.page.lp .pg::after {
  content:''; position:absolute; top:0; right:0; bottom:0; width:34px;
  background:linear-gradient(to left, rgba(0,0,0,.16), rgba(0,0,0,0));
  pointer-events:none;
}
.page.rp .pg::after {
  content:''; position:absolute; top:0; left:0; bottom:0; width:34px;
  background:linear-gradient(to right, rgba(0,0,0,.16), rgba(0,0,0,0));
  pointer-events:none;
}
.pg { position:relative; }
</style>

        <div class="pg" style="background-image:url('20.png');background-size:200% 100%;background-position:right center;"></div>
      </div>
    </div><!-- end #flipbook -->
  </div><!-- end #flipbook-wrap -->
</div>

</div><!-- end #nb-stage -->

<!-- StPageFlip — realistic page-turn library -->
<script src="https://unpkg.com/page-flip@2.0.7/dist/js/page-flip.browser.js"></script>
<script>
let pageFlip = null;

// ── Preload all page images so flipping is instant ──
(function preloadPages() {
  for (let i = 1; i <= 20; i++) {
    const img = new Image();
    img.src = i + '.png';
  }
})();

function nbOpen() {
  const cover = document.getElementById('nb-cover');
  cover.classList.add('nb-closing');
  setTimeout(() => {
    cover.style.display = 'none';
    cover.classList.remove('nb-closing');
    const bookEl = document.getElementById('nb-book-open');
    bookEl.style.display = 'flex';
    bookEl.classList.add('nb-on');

    if (!pageFlip) {
      pageFlip = new St.PageFlip(
        document.getElementById('flipbook'),
        {
          width: 502,
          height: 730,
          size: 'fixed',
          drawShadow: true,
          flippingTime: 950,
          usePortrait: false,
          autoSize: false,
          maxShadowOpacity: 0.55,
          showCover: false,
          mobileScrollSupport: false,
          swipeDistance: 10,
          clickEventForward: true,
          useMouseEvents: true,
          startZIndex: 0,
        }
      );
      pageFlip.loadFromHTML(document.querySelectorAll('#flipbook .page'));
    } else {
      pageFlip.turnToPage(0);
    }
  }, 450);
}

function nbClose() {
  const bookEl = document.getElementById('nb-book-open');
  bookEl.classList.remove('nb-on');
  bookEl.style.display = 'none';
  document.getElementById('nb-cover').style.display = 'block';
  if (pageFlip) pageFlip.turnToPage(0);
}

function onPrev() {
  if (!pageFlip) return;
  if (pageFlip.getCurrentPageIndex() === 0) {
    nbClose();
  } else {
    pageFlip.flipPrev();
  }
}

// ── Landscape lock: rotate on portrait screens & scale to fit ──
function nbFit() {
  const stage = document.getElementById('nb-stage');
  const vw = window.innerWidth, vh = window.innerHeight;
  const portrait = vh > vw;
  const availW = portrait ? vh : vw;
  const availH = portrait ? vw : vh;
  const s = Math.min(availW / 1004, availH / 740, 1);
  const rot = portrait ? ' rotate(90deg)' : '';
  stage.style.transform = 'translate(-50%, -50%)' + rot + ' scale(' + s + ')';
}
window.addEventListener('resize', nbFit);
window.addEventListener('orientationchange', () => setTimeout(nbFit, 120));
nbFit();

function onNext() {
  if (!pageFlip) return;
  if (pageFlip.getCurrentPageIndex() >= pageFlip.getPageCount() - 2) {
    nbClose();
  } else {
    pageFlip.flipNext();
  }
}
</script>
</body>
</html>
